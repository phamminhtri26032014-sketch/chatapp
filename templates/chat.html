<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>

<style>
body{
    margin:0;
    background:#0b0f1a;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:420px;
    height:650px;
    background:#151a2e;
    border-radius:20px;
    display:flex;
}

.sidebar{
    width:120px;
    background:#0f1425;
    color:white;
    padding:10px;
    font-size:13px;
}

.user{
    padding:5px;
    border-bottom:1px solid #222;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    background:#1f2740;
    color:white;
    padding:10px;
}

.chat{
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.msg{
    padding:8px;
    margin:5px 0;
    border-radius:10px;
    max-width:70%;
    color:white;
}

.left{background:#2a2f4a; align-self:flex-start;}
.right{background:#0084ff; align-self:flex-end;}

.input{
    display:flex;
    padding:10px;
    background:#1f2740;
}

input{
    flex:1;
    padding:8px;
}

button{
    margin-left:5px;
}

.login{
    position:absolute;
    background:#151a2e;
    padding:20px;
    border-radius:10px;
    color:white;
}
</style>
</head>

<body>

<div class="login" id="login">
    <h3>Vào chat</h3>
    <input id="name">
    <button onclick="join()">Vào</button>
</div>

<div class="app" id="app" style="display:none;">

    <div class="sidebar">
        <b>🟢 Online</b>
        <div id="users"></div>
    </div>

    <div class="main">
        <div class="header">💬 Chat Room</div>

        <div class="chat" id="chat"></div>

        <div class="input">
            <input id="msg">
            <button onclick="send()">Gửi</button>
        </div>
    </div>

</div>

<script>
const socket = io();
let myName="";

function join(){
    myName = document.getElementById("name").value;
    if(!myName) return;

    socket.emit("join", {name: myName});

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
}

function send(){
    const msg = document.getElementById("msg");

    socket.emit("message_from_client", {
        name: myName,
        message: msg.value
    });

    msg.value="";
}

socket.on("message_from_server", (data)=>{
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.classList.add("msg");

    if(data.name === myName){
        div.classList.add("right");
        div.innerText = data.message;
    } else {
        div.classList.add("left");
        div.innerText = data.name + ": " + data.message;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
});

socket.on("online_users", (users)=>{
    const box = document.getElementById("users");
    box.innerHTML="";
    users.forEach(u=>{
        const d=document.createElement("div");
        d.className="user";
        d.innerText="🟢 "+u;
        box.appendChild(d);
    });
});
</script>

</body>
</html>
