<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:900px;
    height:600px;
    display:flex;
    background:#111827;
    border-radius:15px;
    overflow:hidden;
}

.sidebar{
    width:220px;
    background:#0b1220;
    color:white;
    padding:15px;
}

.chat{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    padding:12px;
    background:#1f2937;
    color:white;
}

.messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.msg{
    padding:10px;
    border-radius:10px;
    max-width:70%;
}

.me{
    background:#3b82f6;
    color:white;
    align-self:flex-end;
}

.other{
    background:#374151;
    color:white;
    align-self:flex-start;
}

.input{
    display:flex;
    padding:10px;
    background:#1f2937;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    margin-left:8px;
    padding:10px;
    border:none;
    background:#22c55e;
    color:white;
    border-radius:8px;
}

.login{
    position:absolute;
    background:#111827;
    padding:20px;
    border-radius:10px;
    color:white;
}
</style>
</head>

<body>

<div class="login" id="loginBox">
    <h3>Vào chat</h3>
    <input id="name" placeholder="Tên bạn">
    <button onclick="join()">OK</button>
</div>

<div class="app" id="app" style="display:none">

    <div class="sidebar">
        <h3>🟢 Online</h3>
        <div id="users"></div>
    </div>

    <div class="chat">

        <div class="header">💬 Chat Room</div>

        <div class="messages" id="messages"></div>

        <div class="input">
            <input id="msg" placeholder="Nhập tin nhắn">
            <button onclick="send()">Gửi</button>
        </div>

    </div>

</div>

<script>
const socket = io();
let myName="";

function join(){
    myName = document.getElementById("name").value;
    if(!myName) return;

    socket.emit("join", {name: myName});

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="flex";
}

function send(){
    const msg = document.getElementById("msg");
    if(!msg.value) return;

    socket.emit("message_from_client", {
        name: myName,
        message: msg.value
    });

    msg.value="";
}

socket.on("message_from_server", (data)=>{
    const box = document.getElementById("messages");

    const div = document.createElement("div");
    div.className="msg";

    if(data.name === myName){
        div.classList.add("me");
        div.innerText = data.message;
    }else{
        div.classList.add("other");
        div.innerText = data.name + ": " + data.message;
    }

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
});

socket.on("online_users", (users)=>{
    const box = document.getElementById("users");
    box.innerHTML="";
    users.forEach(u=>{
        const d=document.createElement("div");
        d.innerText="👤 "+u;
        box.appendChild(d);
    });
});
</script>

</body>
</html>
